name: Backend Docker CI/CD (Multi-Environment)

on:
  # 1. Dev sigue funcionando con push directo normal
  push:
    branches:
      - dev
      
  # 2. Test y Main SOLO funcionan cuando un PR se aprueba y se une 
  pull_request:
    types: [closed]
    branches:
      - test
      - main
      
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api_prueba

jobs:
  build-and-push-image:
    #  Si es un PR, solo se ejecuta si se hizo MERGE, no si se cerró cancelándolo
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      #  Extraer solo la rama destino para nombrar la imagen
      - name: Determinar Etiqueta de Ambiente
        id: info
        run: |
          TARGET_BRANCH=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Tomamos la rama a la que va el PR (test o main)
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
            echo "Merge a rama protegida detectado. Destino: $TARGET_BRANCH"
          else
            # Si es un push directo a dev
            TARGET_BRANCH="dev"
            echo "Push directo detectado. Destino: dev"
          fi

          # Exportamos este valor para que Docker lo use
          echo "branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 1. Etiqueta con el nombre de la rama (dev, test o main)
            type=raw,value=${{ steps.info.outputs.branch }}
            
            # 2. Hash del commit para trazabilidad
            type=sha,format=short

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }} 